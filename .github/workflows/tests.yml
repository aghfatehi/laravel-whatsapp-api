name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tests:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - php: 8.1
            laravel: ^10.0
            testbench: ^8.0
            phpunit: ^10.0
          - php: 8.2
            laravel: ^10.0
            testbench: ^8.0
            phpunit: ^10.0
          - php: 8.3
            laravel: ^10.0
            testbench: ^8.0
            phpunit: ^10.0
          - php: 8.4
            laravel: ^10.0
            testbench: ^8.0
            phpunit: ^10.0

          - php: 8.2
            laravel: ^11.0
            testbench: ^9.0
            phpunit: ^11.0
          - php: 8.3
            laravel: ^11.0
            testbench: ^9.0
            phpunit: ^11.0
          - php: 8.4
            laravel: ^11.0
            testbench: ^9.0
            phpunit: ^11.0

          - php: 8.2
            laravel: ^12.0
            testbench: ^10.0
            phpunit: ^11.0
          - php: 8.3
            laravel: ^12.0
            testbench: ^10.0
            phpunit: ^11.0
          - php: 8.4
            laravel: ^12.0
            testbench: ^10.0
            phpunit: ^11.0

    name: PHP ${{ matrix.php }} - Laravel ${{ matrix.laravel }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer:v2

      - name: Install dependencies
        run: |
          composer require "illuminate/support:${{ matrix.laravel }}" "illuminate/contracts:${{ matrix.laravel }}" "illuminate/http:${{ matrix.laravel }}" "orchestra/testbench:${{ matrix.testbench }}" "phpunit/phpunit:${{ matrix.phpunit }}" --no-interaction --no-update
          composer update --prefer-dist --no-interaction

      - name: Run tests
        run: vendor/bin/phpunit
